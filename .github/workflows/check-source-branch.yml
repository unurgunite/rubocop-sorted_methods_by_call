name: Check source branch
on:
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ ! "${{ github.head_ref }}" =~ ^(v|system/) ]]; then
            echo "PRs to master allowed only from v* or system/* branches"
            exit 1
          fi
